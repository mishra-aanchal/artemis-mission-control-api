$kind: http-request
name: register a new crew member
method: POST
url: "{{baseUrl}}/register"
order: 1000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Aanchal",
      "email": "aanchal@nasa.gov"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const data = pm.response.json();
      const html = `
      <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #1b2735 0%, #090a0f 55%, #05070b 100%); min-height: 100vh; margin: 0; padding: 32px; color: #e6f0ff;">
        <div style="max-width: 720px; margin: 0 auto; background: rgba(10, 16, 28, 0.92); border: 1px solid rgba(122, 162, 255, 0.28); border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45), inset 0 0 0 1px rgba(255,255,255,0.03); overflow: hidden;">
          <div style="padding: 28px 32px; border-bottom: 1px solid rgba(122, 162, 255, 0.16); background: linear-gradient(135deg, rgba(88, 166, 255, 0.14), rgba(155, 92, 255, 0.12));">
            <div style="font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase; color: #8fb7ff; margin-bottom: 8px;">Artemis II Mission Control</div>
            <div style="font-size: 28px; font-weight: 700; color: #ffffff;">Crew Registration Confirmed</div>
          </div>
          <div style="display: grid; grid-template-columns: 140px 1fr; gap: 24px; padding: 28px 32px; align-items: start;">
            <div style="display: flex; align-items: center; justify-content: center; min-height: 140px; border-radius: 18px; background: linear-gradient(180deg, rgba(20, 31, 53, 0.95), rgba(9, 14, 24, 0.95)); border: 1px solid rgba(143, 183, 255, 0.18); padding: 16px; box-shadow: inset 0 0 24px rgba(88, 166, 255, 0.08);">
              ${data.sigil || ''}
            </div>
            <div>
              <div style="display: grid; gap: 14px;">
                <div style="padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(143, 183, 255, 0.1); border-radius: 14px;">
                  <div style="font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #7f9ccf; margin-bottom: 6px;">Name</div>
                  <div style="font-size: 22px; font-weight: 600; color: #f8fbff;">${data.name || '—'}</div>
                </div>
                <div style="display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px;">
                  <div style="padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(143, 183, 255, 0.1); border-radius: 14px;">
                    <div style="font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #7f9ccf; margin-bottom: 6px;">Callsign</div>
                    <div style="font-size: 18px; font-weight: 600; color: #d9e7ff;">${data.callsign || '—'}</div>
                  </div>
                  <div style="padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(143, 183, 255, 0.1); border-radius: 14px;">
                    <div style="font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #7f9ccf; margin-bottom: 6px;">Email</div>
                    <div style="font-size: 16px; color: #d9e7ff; word-break: break-word;">${data.email || '—'}</div>
                  </div>
                </div>
                <div style="padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(143, 183, 255, 0.1); border-radius: 14px;">
                  <div style="font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #7f9ccf; margin-bottom: 6px;">Welcome Message</div>
                  <div style="font-size: 16px; line-height: 1.6; color: #e6f0ff;">${data.welcomeMessage || '—'}</div>
                </div>
                <div style="padding: 14px 16px; background: rgba(7, 12, 22, 0.92); border: 1px solid rgba(106, 227, 255, 0.22); border-radius: 14px; box-shadow: inset 0 0 24px rgba(106, 227, 255, 0.05);">
                  <div style="font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #86dfff; margin-bottom: 6px;">API Key</div>
                  <div style="font-family: SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace; font-size: 15px; color: #b9f3ff; word-break: break-all;">${data.apiKey || '—'}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>`;

      pm.visualizer.set(html, {});