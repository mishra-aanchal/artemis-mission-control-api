$kind: http-request
method: GET
url: '{{baseUrl}}/logs'
order: 2000
headers:
  - key: x-api-key
    value: '{{apiKey}}'
queryParams:
  - key: phase
    value: transit
  - key: category
    value: navigation
  - key: crew_member
    value: wiseman
  - key: status
    value: pending
  - key: priority
    value: high
  - key: sort
    value: desc
