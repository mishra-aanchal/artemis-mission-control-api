$kind: http-request
method: PATCH
url: '{{baseUrl}}/logs/:id'
order: 4000
headers:
  - key: x-api-key
    value: '{{apiKey}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '1'
body:
  type: json
  content: |-
    {
      "status": "complete",
      "priority": "critical"
    }
